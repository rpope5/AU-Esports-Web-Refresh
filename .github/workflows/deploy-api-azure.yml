name: Deploy API To Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api-azure.yml"
      - "docs/DEPLOY_AZURE.md"

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Validate API imports
        run: python -m compileall apps/api/app

      - name: Package API for zip deploy
        run: |
          cd apps/api
          zip -r ../../api-release.zip . \
            -x ".venv/*" "__pycache__/*" "*.pyc" ".pytest_cache/*" "dev.db*" "uploads/*"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure Azure build automation is enabled
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_API_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_API_APP_NAME }}" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Deploy zip package
        run: |
          az webapp deploy \
            --resource-group "${{ secrets.AZURE_API_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_API_APP_NAME }}" \
            --src-path api-release.zip \
            --type zip

      - name: Set startup command
        run: |
          az webapp config set \
            --resource-group "${{ secrets.AZURE_API_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_API_APP_NAME }}" \
            --startup-file "bash startup.sh"
