  <rect width="512" height="512" fill="url(#bg)" />
  <circle cx="256" cy="256" r="180" fill="#0a1f3f" stroke="url(#ring)" stroke-width="8" />
  <circle cx="256" cy="220" r="58" fill="#355f94" />
  <path d="M156 334c0-55 45-100 100-100s100 45 100 100v14H156z" fill="#355f94" />
