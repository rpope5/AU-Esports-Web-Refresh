<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Roster Member Placeholder</title>
  <desc id="desc">Neutral placeholder used when a roster member headshot is missing.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1730" />
      <stop offset="100%" stop-color="#143560" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3e6c" />
      <stop offset="100%" stop-color="#2e5f9f" />
